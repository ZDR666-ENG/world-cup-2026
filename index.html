<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>世界杯2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;color:#333}
.nav{background:linear-gradient(135deg,#667eea,#764ba2);padding:15px 20px;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.nav a{color:#fff;text-decoration:none;font-weight:600;padding:8px 16px;border-radius:20px;transition:.3s}
.nav a:hover,.nav a.active{background:rgba(255,255,255,.2)}
.hero{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-align:center;padding:60px 20px}
.hero h1{font-size:2.5rem;margin-bottom:10px}
.hero p{opacity:.9;font-size:1.1rem}
.stats{display:flex;justify-content:center;gap:40px;margin-top:30px}
.stat{text-align:center}
.stat-num{font-size:2rem;font-weight:bold;color:#ffd700}
.stat-lbl{font-size:.9rem;opacity:.8}
.container{max-width:1200px;margin:0 auto;padding:30px 20px}
.section-title{font-size:1.5rem;margin-bottom:20px;color:#1a365d}
.tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 20px;border:none;border-radius:25px;cursor:pointer;font-weight:600;background:#e2e8f0;color:#666;transition:.3s}
.tab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.1);transition:.3s}
.card:hover{transform:translateY(-3px);box-shadow:0 5px 20px rgba(0,0,0,.15)}
.card-header{background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;display:flex;align-items:center;gap:15px}
.card-header img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid #fff}
.card-body{padding:15px}
.card-name{font-weight:bold;font-size:1.1rem}
.card-sub{color:#718096;font-size:.9rem}
.card-stats{display:flex;gap:20px;margin-top:10px;font-size:.9rem}
.match-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.1);margin-bottom:15px}
.match-teams{display:flex;justify-content:space-between;align-items:center}
.team-info{display:flex;align-items:center;gap:10px}
.team-info img{width:40px;height:40px;object-fit:contain}
.score{font-size:1.5rem;font-weight:bold;min-width:80px;text-align:center}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.8rem;color:#fff}
.badge-live{background:#e53e3e}
.badge-finish{background:#38a169}
.badge-schedule{background:#3182ce}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}
th{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:12px 8px;text-align:center}
td{padding:10px 8px;border-bottom:1px solid #e2e8f0;text-align:center}
tr:hover{background:#f7fafc}
.player-card{background:#fff;border-radius:15px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.1)}
.player-top{background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;text-align:center}
.player-top img{width:80px;height:80px;border-radius:50%;border:3px solid #fff;object-fit:cover}
.player-info{padding:15px;text-align:center}
.player-info h3{margin-bottom:5px}
.player-info .pos{color:#667eea;font-weight:600;font-size:.9rem}
.player-stats{display:flex;justify-content:space-around;padding:10px;border-top:1px solid #e2e8f0}
.player-stats div{text-align:center}
.player-stats .val{font-size:1.3rem;font-weight:bold}
.player-stats .lbl{font-size:.75rem;color:#718096}
.page{display:none}
.page.active{display:block}
.podium{display:flex;justify-content:center;align-items:flex-end;gap:20px;margin:30px 0}
.podium-item{background:#fff;border-radius:15px;padding:20px;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,.1)}
.podium-item.first{transform:scale(1.1)}
.podium-item img{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:10px}
.podium-goals{background:linear-gradient(135deg,#38a169,#48bb78);color:#fff;padding:5px 15px;border-radius:15px;font-weight:bold}
.news-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.news-card img{width:100%;height:180px;object-fit:cover}
.news-card .news-body{padding:15px}
.news-card h3{font-size:1.1rem;margin-bottom:8px}
.news-card p{color:#718096;font-size:.9rem;line-height:1.5}
.footer{background:linear-gradient(135deg,#1a365d,#2c5282);color:#fff;text-align:center;padding:30px 20px;margin-top:40px}
@media(max-width:768px){
.hero h1{font-size:1.8rem}
.stats{gap:20px}
.stat-num{font-size:1.5rem}
.card-grid{grid-template-columns:1fr}
.podium{flex-direction:column;align-items:center}
.podium-item.first{transform:none}
.tabs{justify-content:center}
}
</style>
</head>
<body>

<div class="nav">
<div class="nav-inner">
<a href="#" onclick="showPage('home');return false">⚽ 世界杯2026</a>
<div>
<a href="#" onclick="showPage('matches');return false">比赛</a>
<a href="#" onclick="showPage('standings');return false">积分榜</a>
<a href="#" onclick="showPage('teams');return false">球队</a>
<a href="#" onclick="showPage('players');return false">球员</a>
<a href="#" onclick="showPage('goals');return false">射手榜</a>
<a href="#" onclick="showPage('news');return false">新闻</a>
</div>
</div>
</div>

<div id="home" class="page active">
<div class="hero">
<h1>2026 FIFA 世界杯</h1>
<p>实时数据 · 精彩赛事 · 球星风采</p>
<div class="stats">
<div class="stat"><div class="stat-num" id="matchCount">0</div><div class="stat-lbl">场比赛</div></div>
<div class="stat"><div class="stat-num">12</div><div class="stat-lbl">支球队</div></div>
<div class="stat"><div class="stat-num" id="topGoal">0</div><div class="stat-lbl">最高进球</div></div>
</div>
</div>
<div class="container">
<h2 class="section-title">实时比分</h2>
<div id="liveMatches"></div>
<h2 class="section-title" style="margin-top:30px">射手榜 TOP 5</h2>
<div id="topScorers"></div>
</div>
</div>

<div id="matches" class="page">
<div class="container">
<h2 class="section-title">所有比赛</h2>
<div id="allMatches"></div>
</div>
</div>

<div id="standings" class="page">
<div class="container">
<h2 class="section-title">小组积分榜</h2>
<div id="standingsTable"></div>
</div>
</div>

<div id="teams" class="page">
<div class="container">
<h2 class="section-title">参赛球队</h2>
<div class="card-grid" id="teamsGrid"></div>
</div>
</div>

<div id="players" class="page">
<div class="container">
<h2 class="section-title">球员中心</h2>
<div class="card-grid" id="playersGrid"></div>
</div>
</div>

<div id="goals" class="page">
<div class="container">
<h2 class="section-title">射手榜</h2>
<div class="podium" id="podium"></div>
<div class="table-wrap" id="goalsTable"></div>
</div>
</div>

<div id="news" class="page">
<div class="container">
<h2 class="section-title">最新新闻</h2>
<div class="card-grid" id="newsGrid"></div>
</div>
</div>

<div class="footer">
<p>&copy; 2026 FIFA 世界杯数据网站</p>
</div>

<script>
var teams=[
{id:1,name:"巴西",tla:"BRA",crest:"https://flagcdn.com/w80/br.png",venue:"马拉卡纳",colors:"黄/绿",founded:1914},
{id:2,name:"阿根廷",tla:"ARG",crest:"https://flagcdn.com/w80/ar.png",venue:"纪念碑",colors:"天蓝/白",founded:1893},
{id:3,name:"法国",tla:"FRA",crest:"https://flagcdn.com/w80/fr.png",venue:"法兰西大球场",colors:"蓝/白/红",founded:1904},
{id:4,name:"德国",tla:"GER",crest:"https://flagcdn.com/w80/de.png",venue:"安联球场",colors:"黑/红/金",founded:1900},
{id:5,name:"西班牙",tla:"ESP",crest:"https://flagcdn.com/w80/es.png",venue:"伯纳乌",colors:"红/黄",founded:1909},
{id:6,name:"英格兰",tla:"ENG",crest:"https://flagcdn.com/w80/gb.png",venue:"温布利",colors:"白",founded:1863},
{id:7,name:"葡萄牙",tla:"POR",crest:"https://flagcdn.com/w80/pt.png",venue:"光明球场",colors:"红/绿",founded:1914},
{id:8,name:"荷兰",tla:"NED",crest:"https://flagcdn.com/w80/nl.png",venue:"克鲁伊夫球场",colors:"橙",founded:1889},
{id:9,name:"日本",tla:"JPN",crest:"https://flagcdn.com/w80/jp.png",venue:"国立竞技场",colors:"蓝/白",founded:1921},
{id:10,name:"韩国",tla:"KOR",crest:"https://flagcdn.com/w80/kr.png",venue:"首尔世界杯球场",colors:"红/蓝",founded:1928},
{id:11,name:"中国",tla:"CHN",crest:"https://flagcdn.com/w80/cn.png",venue:"工人体育场",colors:"红/黄",founded:1924},
{id:12,name:"美国",tla:"USA",crest:"https://flagcdn.com/w80/us.png",venue:"玫瑰碗",colors:"红/白/蓝",founded:1913}
];

var players=[
{name:"内马尔",team:"巴西",teamId:1,pos:"前锋",num:10,goals:5,assists:3,rating:8.5,photo:"https://ui-avatars.com/api/?name=Neymar&background=0D8ABC&color=fff&size=100",hl:["世界杯历史射手榜前10","桑巴足球代表人物"]},
{name:"梅西",team:"阿根廷",teamId:2,pos:"前锋",num:10,goals:4,assists:5,rating:9.2,photo:"https://ui-avatars.com/api/?name=Messi&background=75AADB&color=fff&size=100",hl:["8座金球奖得主","世界杯冠军"]},
{name:"姆巴佩",team:"法国",teamId:3,pos:"前锋",num:10,goals:6,assists:2,rating:9.0,photo:"https://ui-avatars.com/api/?name=Mbappe&background=002654&color=fff&size=100",hl:["2018年世界杯冠军","速度型前锋典范"]},
{name:"哈兰德",team:"德国",teamId:4,pos:"前锋",num:9,goals:4,assists:1,rating:8.8,photo:"https://ui-avatars.com/api/?name=Haaland&background=DD0000&color=fff&size=100",hl:["德甲历史最快50球","禁区杀手"]},
{name:"维尼修斯",team:"巴西",teamId:1,pos:"前锋",num:20,goals:3,assists:4,rating:8.7,photo:"https://ui-avatars.com/api/?name=Vinicius&background=009739&color=fff&size=100",hl:["皇马核心","欧冠决赛MVP"]},
{name:"贝林厄姆",team:"英格兰",teamId:6,pos:"中场",num:5,goals:2,assists:3,rating:8.4,photo:"https://ui-avatars.com/api/?name=Bellingham&background=C8102E&color=fff&size=100",hl:["皇马新星","全能中场"]},
{name:"佩德里",team:"西班牙",teamId:5,pos:"中场",num:8,goals:1,assists:4,rating:8.6,photo:"https://ui-avatars.com/api/?name=Pedri&background=AA151D&color=fff&size=100",hl:["巴萨核心","传球大师"]},
{name:"C罗",team:"葡萄牙",teamId:7,pos:"前锋",num:7,goals:3,assists:1,rating:8.1,photo:"https://ui-avatars.com/api/?name=Ronaldo&background=006600&color=fff&size=100",hl:["国家队历史射手王","5座金球奖"]},
{name:"孙兴慜",team:"韩国",teamId:10,pos:"前锋",num:7,goals:2,assists:2,rating:8.3,photo:"https://ui-avatars.com/api/?name=Son&background=003478&color=fff&size=100",hl:["亚洲足球骄傲","英超金靴"]},
{name:"久保建英",team:"日本",teamId:9,pos:"中场",num:10,goals:2,assists:3,rating:8.2,photo:"https://ui-avatars.com/api/?name=Kubo&background=BC002D&color=fff&size=100",hl:["日本足球天才","技术细腻"]}
];

var goalScorers=players.slice().sort(function(a,b){return b.goals-a.goals}).map(function(p,i){return{rank:i+1,player:p,goals:p.goals,assists:p.assists}});

function mkMatch(h,a,hs,as,status,group,md){
var ht=teams.find(function(t){return t.id===h});
var at=teams.find(function(t){return t.id===a});
return{home:ht,away:at,homeScore:hs,awayScore:as,status:status,group:group,matchday:md};
}
var matches=[
mkMatch(9,1,1,2,"IN_PLAY","A",1),
mkMatch(11,12,3,1,"FINISHED","A",1),
mkMatch(3,10,null,null,"SCHEDULED","B",1),
mkMatch(4,11,null,null,"SCHEDULED","B",1),
mkMatch(5,6,null,null,"SCHEDULED","C",1),
mkMatch(7,8,null,null,"SCHEDULED","C",1)
];

document.getElementById("matchCount").textContent=matches.length;
document.getElementById("topGoal").textContent=goalScorers[0]?goalScorers[0].goals:0;

function renderMatch(m){
var sc=m.status==="IN_PLAY"||m.status==="FINISHED"||m.status==="PAUSED";
var badge=m.status==="IN_PLAY"?"badge-live":m.status==="FINISHED"?"badge-finish":"badge-schedule";
var label=m.status==="IN_PLAY"?"进行中":m.status==="FINISHED"?"已结束":"未开始";
return '<div class="match-card"><div class="match-teams">'+
'<div class="team-info"><img src="'+m.home.crest+'"><div><div style="font-weight:600">'+m.home.name+'</div><div style="font-size:.8rem;color:#718096">'+m.home.tla+'</div></div></div>'+
'<div class="score">'+(sc?m.homeScore+" - "+m.awayScore:"vs")+'</div>'+
'<div class="team-info"><div style="text-align:right"><div style="font-weight:600">'+m.away.name+'</div><div style="font-size:.8rem;color:#718096">'+m.away.tla+'</div></div><img src="'+m.away.crest+'"></div>'+
'</div><div style="margin-top:10px"><span class="badge '+badge+'">'+label+'</span> <span style="color:#718096;font-size:.85rem;margin-left:10px">小组'+m.group+' 第'+m.matchday+'轮</span></div></div>';
}

var liveHtml="";matches.forEach(function(m){if(m.status==="IN_PLAY")liveHtml+=renderMatch(m)});
if(!liveHtml)matches.slice(0,3).forEach(function(m){liveHtml+=renderMatch(m)});
document.getElementById("liveMatches").innerHTML=liveHtml;

var allHtml="";matches.forEach(function(m){allHtml+=renderMatch(m)});
document.getElementById("allMatches").innerHTML=allHtml;

var standGroups=["A","B","C"];
var standHtml="";
standGroups.forEach(function(g){
var gm=matches.filter(function(m){return m.group===g});
var teamsInGroup=[];
gm.forEach(function(m){
if(!teamsInGroup.find(function(t){return t.id===m.home.id}))teamsInGroup.push(m.home);
if(!teamsInGroup.find(function(t){return t.id===m.away.id}))teamsInGroup.push(m.away);
});
standHtml+='<table style="margin-bottom:20px"><thead><tr><th>#</th><th>球队</th><th>场</th><th>胜</th><th>平</th><th>负</th><th>进</th><th>失</th><th>净</th><th>分</th></tr></thead><tbody>';
teamsInGroup.forEach(function(t,i){
var played=0,won=0,draw=0,lost=0,gf=0,ga=0;
gm.forEach(function(m){
var isHome=m.home.id===t.id;
var my=isHome?m.homeScore:m.awayScore;
var opp=isHome?m.awayScore:m.homeScore;
if(my!==null&&opp!==null){played++;gf+=(my||0);ga+=(opp||0);
if(my>opp)won++;else if(my<opp)lost++;else draw++;}
});
var pts=won*3+draw;
standHtml+='<tr><td>'+(i+1)+'</td><td style="text-align:left"><img src="'+t.crest+'" style="width:24px;vertical-align:middle;margin-right:5px">'+t.name+'</td><td>'+played+'</td><td>'+won+'</td><td>'+draw+'</td><td>'+lost+'</td><td>'+gf+'</td><td>'+ga+'</td><td>'+(gf-ga)+'</td><td><b>'+pts+'</b></td></tr>';
});
standHtml+='</tbody></table>';
});
document.getElementById("standingsTable").innerHTML=standHtml;

var teamsHtml="";
teams.forEach(function(t){
teamsHtml+='<div class="card"><div class="card-header"><img src="'+t.crest+'" style="width:60px;height:60px;border-radius:0;border:none"></div>'+
'<div class="card-body"><div class="card-name">'+t.name+'</div><div class="card-sub">'+t.tla+'</div>'+
'<div class="card-stats"><span>🏟️ '+t.venue+'</span><span>🎨 '+t.colors+'</span></div></div></div>';
});
document.getElementById("teamsGrid").innerHTML=teamsHtml;

var playersHtml="";
players.forEach(function(p){
playersHtml+='<div class="player-card"><div class="player-top"><img src="'+p.photo+'"></div>'+
'<div class="player-info"><h3>'+p.name+'</h3><div class="pos">'+p.pos+' #'+p.num+'</div></div>'+
'<div class="player-stats"><div><div class="val">'+p.goals+'</div><div class="lbl">进球</div></div>'+
'<div><div class="val">'+p.assists+'</div><div class="lbl">助攻</div></div>'+
'<div><div class="val">'+p.rating+'</div><div class="lbl">评分</div></div></div></div>';
});
document.getElementById("playersGrid").innerHTML=playersHtml;

var podiumHtml="";
goalScorers.slice(0,3).forEach(function(g,i){
podiumHtml+='<div class="podium-item '+(i===0?"first":"")+'"><img src="'+g.player.photo+'">'+
'<div style="font-weight:bold">'+g.player.name+'</div><div style="color:#718096;font-size:.9rem">'+g.player.team+'</div>'+
'<div class="podium-goals">'+g.goals+' 球</div></div>';
});
document.getElementById("podium").innerHTML=podiumHtml;

var goalsTbl='<table><thead><tr><th>#</th><th>球员</th><th>国家</th><th>进球</th><th>助攻</th></tr></thead><tbody>';
goalScorers.forEach(function(g){
goalsTbl+='<tr><td>'+g.rank+'</td><td style="text-align:left"><img src="'+g.player.photo+'" style="width:30px;height:30px;border-radius:50%;vertical-align:middle;margin-right:5px">'+g.player.name+'</td><td>'+g.player.team+'</td><td style="color:#38a169;font-weight:bold">'+g.goals+'</td><td>'+g.assists+'</td></tr>';
});
goalsTbl+='</tbody></table>';
document.getElementById("goalsTable").innerHTML=goalsTbl;

var newsData=[
{title:"梅西宣布最后一届世界杯",desc:"阿根廷球星梅西确认2026年世界杯将是他职业生涯的最后一届世界杯",img:"https://picsum.photos/seed/fb1/800/400"},
{title:"姆巴佩vs哈兰德：新一代球王之争",desc:"法国巨星姆巴佩与挪威杀手哈兰德的对决已成为当今足坛最热门的话题",img:"https://picsum.photos/seed/fb2/800/400"},
{title:"巴西新10号维尼修斯",desc:"维尼修斯在本届世界杯上展现出惊人的状态，他的速度和突破让对手防不胜防",img:"https://picsum.photos/seed/fb3/800/400"}
];
var newsHtml="";
newsData.forEach(function(n){
newsHtml+='<div class="news-card"><img src="'+n.img+'"><div class="news-body"><h3>'+n.title+'</h3><p>'+n.desc+'</p></div></div>';
});
document.getElementById("newsGrid").innerHTML=newsHtml;

function showPage(id){
document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});
document.getElementById(id).classList.add("active");
window.scrollTo(0,0);
}
</script>
</body>
</html>
